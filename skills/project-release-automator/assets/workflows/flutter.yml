# Generated by Project Release Automator
# Template: flutter-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: android-apk
            command: flutter build apk --release
            source: build/app/outputs/flutter-apk/app-release.apk
            kind: file
          - os: ubuntu-latest
            platform: android-aab
            command: flutter build appbundle --release
            source: build/app/outputs/bundle/release/app-release.aab
            kind: file
          - os: windows-latest
            platform: windows-x64
            command: flutter build windows --release
            source: build/windows/x64/runner/Release
            kind: zip
          - os: ubuntu-latest
            platform: linux-x64
            command: flutter build linux --release
            source: build/linux/x64/release/bundle
            kind: tar
          - os: macos-15-intel
            platform: macos-x64
            command: flutter build macos --release
            source: build/macos/Build/Products/Release
            kind: zip
          - os: macos-latest
            platform: macos-arm64
            command: flutter build macos --release
            source: build/macos/Build/Products/Release
            kind: zip
          - os: ubuntu-latest
            platform: web
            command: flutter build web --release
            source: build/web
            kind: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/setup-java@v5
        if: startsWith(matrix.platform, 'android-')
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
      - name: Install dependencies
        run: flutter pub get
      - name: Test
        run: flutter test
      - name: Build
        run: ${{ matrix.command }}
      - name: Package
        shell: pwsh
        run: |
          $source = "${{ matrix.source }}"
          if (-not (Test-Path -LiteralPath $source)) { throw "Flutter output not found: $source" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $extension = if ("${{ matrix.kind }}" -eq "file") { [IO.Path]::GetExtension($source) } elseif ("${{ matrix.kind }}" -eq "tar") { ".tar.gz" } else { ".zip" }
          $asset = "release-assets/{{ARTIFACT_STEM}}-${{ matrix.platform }}$extension"
          if ("${{ matrix.kind }}" -eq "file") { Copy-Item -LiteralPath $source -Destination $asset }
          elseif ("${{ matrix.kind }}" -eq "tar") { tar -czf $asset -C $source . }
          else { Compress-Archive -Path (Join-Path $source "*") -DestinationPath $asset }
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
