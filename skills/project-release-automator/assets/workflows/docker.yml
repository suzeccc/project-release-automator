# Generated by Project Release Automator
# Template: docker-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: {{DOCKERFILE}}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          labels: org.opencontainers.image.version=${{ github.ref_name }}
      - name: Write image manifest
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          New-Item -ItemType Directory -Force release-assets | Out-Null
          "${{ steps.image.outputs.name }}:${{ github.ref_name }}@${{ steps.build.outputs.digest }}" | Set-Content -Encoding utf8 "release-assets/{{ARTIFACT_STEM}}-$version-image.txt"
      - uses: actions/upload-artifact@v7
        with:
          name: image-manifest
          path: release-assets/*-image.txt
          if-no-files-found: error
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*-image.txt
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Published multi-architecture image ${{ steps.image.outputs.name }}:${{ github.ref_name }}."
