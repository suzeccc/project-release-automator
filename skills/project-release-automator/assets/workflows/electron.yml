# Generated by Project Release Automator
# Template: electron-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-11-arm
            platform: windows
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x64
          - os: macos-latest
            platform: macos
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
{{PACKAGE_MANAGER_SETUP}}
      - name: Install dependencies
        run: {{INSTALL_COMMAND}}
{{TEST_STEP}}
      - name: Build Electron packages
        run: {{ELECTRON_BUILD_COMMAND}}
      - name: Package output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "{{ELECTRON_OUTPUT}}" -PathType Container)) { throw "Electron output directory not found" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -Path "{{ELECTRON_OUTPUT}}/*" -DestinationPath "release-assets/{{ARTIFACT_STEM}}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
