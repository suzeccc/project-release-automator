# Generated by Project Release Automator
# Template: rust-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --all
      - name: Package crate
        run: cargo package --allow-dirty
      - uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: target/package/*.crate
          if-no-files-found: error
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" target/package/*.crate
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
