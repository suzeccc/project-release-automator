# Generated by Project Release Automator
# Template: android-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Build APK and AAB
        run: |
          chmod +x ./gradlew
          ./gradlew test assembleRelease bundleRelease --no-daemon
      - name: Collect packages
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $apk = @(Get-ChildItem -LiteralPath "{{ANDROID_MODULE}}/build/outputs/apk/release" -Recurse -File -Filter "*.apk")
          $aab = @(Get-ChildItem -LiteralPath "{{ANDROID_MODULE}}/build/outputs/bundle/release" -Recurse -File -Filter "*.aab")
          if ($apk.Count -ne 1 -or $aab.Count -ne 1) { throw "Expected one release APK and one release AAB" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item -LiteralPath $apk[0].FullName -Destination "release-assets/{{ARTIFACT_STEM}}-$version.apk"
          Copy-Item -LiteralPath $aab[0].FullName -Destination "release-assets/{{ARTIFACT_STEM}}-$version.aab"
      - uses: actions/upload-artifact@v7
        with:
          name: android-packages
          path: release-assets/*
          if-no-files-found: error
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated unsigned release packages for $GITHUB_REF_NAME."
