# Generated by Project Release Automator
# Template: dotnet-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "{{DOTNET_VERSION}}"
      - name: Restore
        run: dotnet restore "{{DOTNET_PROJECT}}"
      - name: Test
        run: dotnet test "{{DOTNET_PROJECT}}" --no-restore --configuration Release
      - name: Pack
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          dotnet pack "{{DOTNET_PROJECT}}" --no-restore --configuration Release -p:PackageVersion=$version --output dist
      - uses: actions/upload-artifact@v7
        with:
          name: dotnet-packages
          path: dist/*.nupkg
          if-no-files-found: error
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*.nupkg
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
