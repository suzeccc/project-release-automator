# Generated by Project Release Automator
# Template: java-v1
# Expected asset: {{EXPECTED_ASSET}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: {{JAVA_CACHE}}
      - name: Test and package
        run: {{JAVA_BUILD_COMMAND}}
      - name: Collect packages
        shell: bash
        run: |
          mkdir -p release-assets
          find {{JAVA_ARTIFACT_DIRECTORY}} -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-plain.jar' -exec cp {} release-assets/ \;
      - uses: actions/upload-artifact@v7
        with:
          name: java-packages
          path: release-assets/*.jar
          if-no-files-found: error
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.jar
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
