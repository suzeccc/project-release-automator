# Generated by Project Release Automator
# Template: cmake-v1
{{EXPECTED_ASSET_COMMENTS}}
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            cmakeArgs: -A x64
          - os: windows-11-arm
            platform: windows
            arch: arm64
            cmakeArgs: -A ARM64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            cmakeArgs: ""
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            cmakeArgs: ""
          - os: macos-15-intel
            platform: macos
            arch: x64
            cmakeArgs: ""
          - os: macos-latest
            platform: macos
            arch: arm64
            cmakeArgs: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmakeArgs }}
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Package executable
        shell: pwsh
        run: |
          $candidates = @(Get-ChildItem -LiteralPath build -Recurse -File | Where-Object { $_.Name -in @("{{CMAKE_TARGET}}", "{{CMAKE_TARGET}}.exe") })
          if ($candidates.Count -ne 1) { throw "Expected one {{CMAKE_TARGET}} executable, found $($candidates.Count)" }
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Compress-Archive -LiteralPath $candidates[0].FullName -DestinationPath "release-assets/{{ARTIFACT_STEM}}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip
          --draft --title "{{PROJECT_NAME}} $GITHUB_REF_NAME"
          --notes "Automated draft release for $GITHUB_REF_NAME."
